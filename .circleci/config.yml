version: 2.1

# Define the jobs we want to run for this project.
# We always test 2 previous PHP versions.
jobs:
  php_8-3:
    docker:
    - image: php:8.3-apache
    - image: mysql:5.7
      environment:
        MYSQL_ROOT_PASSWORD: test
        MYSQL_DATABASE: equal
    working_directory: ~/repo
    steps:
      # install dependencies
      - run: apt-get update && apt-get -y install git libzip-dev libicu-dev default-mysql-client
      - run: docker-php-ext-install pdo pdo_mysql mysqli zip intl
      - run: docker-php-ext-enable mysqli
      - checkout:
          path: ~/repo
      # assign folders permissions
      - run: php run.php --do=init_fs
      # check that mandatory directories are present and have correct access rights set
      - run: php run.php --do=test_fs-consistency
      # check ability to connect to the dbms service
      - run: php run.php --do=test_db-connectivity
      # create an empty database
      - run: php run.php --do=init_db
      # initialize database with demo data
      - run: php run.php --do=init_package --package=core --ignore_platform=true
      # create temp config file for init with FMT specific constants
      - run: |
          echo "{\"DEFAULT_LANG\": \"fr\", \"FMT_INSTANCE_TYPE\": \"global\", \"FMT_API_URL_EDMS\": \"http://localhost/\", \"FMT_API_URL_GLOBAL\": \"http://localhost/\", \"MINDEE_API_KEY\": \"\"}" > config/config.json
      - run: php run.php --do=init_package --package=fmt --import=true --ignore_platform=true
      # create a config file with FMT specific constants & specific services
      - run: |
          echo "{\"DEFAULT_LANG\": \"fr\", \"FMT_INSTANCE_TYPE\": \"global\", \"FMT_API_URL_EDMS\": \"http://localhost/\", \"FMT_API_URL_GLOBAL\": \"http://localhost/\", \"MINDEE_API_KEY\": \"\", \"SERVICE_ORM_COLLECTION_CLASS\": \"fmt\\\\orm\\\\Collection\", \"SERVICE_ACCESS_ACCESSCONTROLLER\": \"fmt\\\\access\\\\AccessController\"}" > config/config.json
      # verify the content of the file
      - run: php run.php --do=init_package --package=fmt --force=true --import=false --demo=true
      # run test units
      # - run: php run.php --do=test_package --package=core
      # FMT
      - run: php run.php --do=test_package --package=fmt
      # export logs on failure
      - run:
          command: |
            mkdir -p /tmp/dumps
            cp ~/repo/log/equal.log /tmp/dumps
          when: on_fail
      - store_artifacts:
          path: /tmp/dumps

# Orchestrate our job run sequence
workflows:
  build_and_test:
    jobs:
      - php_8-3
